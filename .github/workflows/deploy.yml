name: api-playing-field deployment

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    # Valores que deben ganar a .env.example (sqlite) en CI; Laravel no pisa variables ya definidas.
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: ${{ secrets.DB_API_FIELD_DATABASE }}
      DB_USERNAME: ${{ secrets.DB_API_FIELD_USER }}
      DB_PASSWORD: ${{ secrets.DB_API_FIELD_PASSWORD }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_API_FIELD_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_API_FIELD_DATABASE }}
          MYSQL_USER: ${{ secrets.DB_API_FIELD_USER }}
          MYSQL_PASSWORD: ${{ secrets.DB_API_FIELD_PASSWORD }}
        ports:
          - 3306:3306
    steps:
      - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
        with:
          php-version: "8.3"
      - uses: actions/checkout@v4
      - name: Prepare .env for CI
        run: cp .env.example .env
      - name: Install Dependencies
        run: composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Generate application key
        run: php artisan key:generate --force
      - name: Run migrations the database
        run: php artisan migrate --force --seed
      - name: Clear Config and Cache
        run: |
          php artisan config:cache
          php artisan route:clear
      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache
      - name: Deploy to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_API_FIELD_SERVER }}
          username: ${{ secrets.FTP_API_FIELD_USERNAME }}
          password: ${{ secrets.FTP_API_FIELD_PASSWORD }}
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            .env
            **/.env
